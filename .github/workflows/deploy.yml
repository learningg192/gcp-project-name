name: Deploy

on:
  workflow_run:
    workflows: ["CI-CD Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull us-central1-docker.pkg.dev/ams-kap/emp-app-repo/emp-app:latest

            docker stop emp-app || true
            docker rm emp-app || true

            docker run -d -p 80:80 \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --name emp-app \
            us-central1-docker.pkg.dev/ams-kap/emp-app-repo/emp-app:latest